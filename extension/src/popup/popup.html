<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gran Maestro</title>
    <style>
      :root {
        --panel-bg: #f2f4f7;
        --text: #111827;
        --text-soft: #4b5563;
        --accent: #2563eb;
        --success: #16a34a;
        --danger: #dc2626;
        --border: #e5e7eb;
      }

      body {
        width: 280px;
        margin: 0;
        padding: 12px;
        font-family: 'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(160deg, #f8fafc, #ffffff);
        color: var(--text);
      }

      .panel {
        border-radius: 12px;
        padding: 12px;
        background: var(--panel-bg);
        border: 1px solid var(--border);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--danger);
      }

      .status-dot.online {
        background: var(--success);
      }

      .status-text {
        color: var(--text-soft);
        font-size: 12px;
      }

      .inspect-toggle {
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        padding: 9px 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .project-row {
        margin: 10px 0;
        display: grid;
        gap: 6px;
      }

      .project-select-row {
        display: flex;
        gap: 6px;
      }

      .project-label {
        font-size: 12px;
        color: var(--text-soft);
      }

      .project-select {
        width: 100%;
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 8px;
        padding: 8px;
        color: var(--text);
      }

      .refresh-btn {
        width: 36px;
        flex: 0 0 36px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }

      .overlay-toggle {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        padding: 9px 12px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Gran Maestro</h1>
      <div class="status">
        <span id="serverStatusDot" class="status-dot" aria-hidden="true"></span>
        <span id="serverStatusText" class="status-text">Server: unknown</span>
      </div>
      <div class="project-row">
        <label class="project-label" for="projectSelect">Project</label>
        <div class="project-select-row">
          <select id="projectSelect" class="project-select"></select>
          <button id="refreshProjects" class="refresh-btn" type="button" title="Refresh projects">↻</button>
        </div>
      </div>
      <button id="inspectToggle" class="inspect-toggle" type="button">Pick Element</button>
      <p id="inspectText" style="font-size: 12px; color: var(--text-soft); margin: 10px 0 0">
        Pick an element on the page
      </p>
      <button id="overlayToggle" class="overlay-toggle" type="button">Show Element IDs</button>
      <p id="overlayText" style="font-size: 12px; color: var(--text-soft); margin: 10px 0 0">
        Element IDs: OFF
      </p>
    </main>
    <script src="../../dist/popup.js" defer></script>
  </body>
</html>
